name: CyanPrint Test

on:
  workflow_call:
    inputs:
      atomi_platform:
        required: true
        type: string
      atomi_service:
        required: true
        type: string

jobs:
  cyanprint-test:
    name: CyanPrint Test
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-${{ inputs.atomi_platform }}-${{ inputs.atomi_service }}-nix-store-cache
    steps:
      # Setup
      - uses: actions/checkout@v4
      - uses: AtomiCloud/actions.setup-nix@v2
      - uses: AtomiCloud/actions.cache-nuget@v1

      # Run all CyanPrint tests via Taskfile
      # cyanprint is only available in local dev (atomiutils on macOS)
      - name: Check cyanprint availability
        id: check-cyanprint
        run: |
          if nix develop .#default -c which cyanprint >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run CyanPrint tests
        if: steps.check-cyanprint.outputs.available == 'true'
        run: nix develop .#default -c task test:all

      - name: CyanPrint skipped
        if: steps.check-cyanprint.outputs.available == 'false'
        run: echo "::warning::cyanprint CLI not available in CI — tests skipped"
