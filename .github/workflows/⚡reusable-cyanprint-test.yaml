name: CyanPrint Test

on:
  workflow_call:
    inputs:
      atomi_platform:
        required: true
        type: string
      atomi_service:
        required: true
        type: string

jobs:
  cyanprint-test:
    name: CyanPrint Test
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-${{ inputs.atomi_platform }}-${{ inputs.atomi_service }}-nix-store-cache
    steps:
      # Setup
      - uses: AtomiCloud/actions.setup-nix@v2
      - uses: AtomiCloud/actions.cache-nuget@v1

      # Run all CyanPrint tests
      - name: Run CyanPrint tests
        run: |
          nix develop .#ci -c cyanprint test template sdks/dotnet/template
          nix develop .#ci -c cyanprint test processor sdks/dotnet/processor
          nix develop .#ci -c cyanprint test plugin sdks/dotnet/plugin
          nix develop .#ci -c cyanprint test resolver sdks/dotnet/resolver
          nix develop .#ci -c cyanprint test template sdks/node/template
          nix develop .#ci -c cyanprint test processor sdks/node/processor
          nix develop .#ci -c cyanprint test plugin sdks/node/plugin
          nix develop .#ci -c cyanprint test resolver sdks/node/resolver
          nix develop .#ci -c cyanprint test template sdks/python/template
          nix develop .#ci -c cyanprint test processor sdks/python/processor
          nix develop .#ci -c cyanprint test plugin sdks/python/plugin
          nix develop .#ci -c cyanprint test resolver sdks/python/resolver
